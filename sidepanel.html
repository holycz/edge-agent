<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 问答助手</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="ai-sidebar-container">
    <!-- 头部 -->
    <div class="ai-header">
      <span class="ai-title">AI 问答助手</span>
      <div class="ai-header-actions">
        <span class="ai-header-btn ai-new-chat" title="新建对话">➕</span>
        <span class="ai-header-btn ai-config-btn" title="设置">⚙️</span>
      </div>
    </div>
    
    <!-- 消息区域 -->
    <div class="ai-messages" id="ai-messages"></div>
    
    <!-- 底部操作区 -->
    <div class="ai-bottom-bar">
      <!-- 输入区域 -->
      <div class="ai-input-bar">
        <div class="ai-input-wrapper">
          <textarea class="ai-input" id="ai-input" placeholder="输入问题，按回车发送..."></textarea>
          <div class="ai-input-toolbar">
            <label class="ai-think-checkbox" title="启用 Think 模式">
              <input type="checkbox" id="ai-enable-think">
              <span>Think</span>
            </label>
            <button class="ai-send" id="ai-send">发送</button>
          </div>
        </div>
      </div>
      
      <!-- 上下文状态栏 -->
      <div class="ai-context-bar">
        <div class="ai-context-left">
          <button class="ai-refresh-context-mini" title="刷新网页上下文">🔄</button>
          <span id="ai-context-info" class="context-info">点击刷新获取页面内容</span>
        </div>
      </div>
    </div>
  </div>
  
<!-- 设置面板 -->
<div class="ai-config-panel" id="ai-config-panel" style="display: none;">
  <div class="ai-config-header">
    <span>设置</span>
    <span class="ai-config-close">×</span>
  </div>
  <div class="ai-config-content">
    <div class="ai-config-item">
      <label>API Key</label>
      <input type="password" class="ai-config-input" id="ai-api-key" placeholder="输入你的 API Key">
    </div>
    <div class="ai-config-item">
      <label>API URL</label>
      <input type="text" class="ai-config-input" id="ai-api-url" placeholder="https://integrate.api.nvidia.com/v1">
    </div>
    <div class="ai-config-item">
      <label>模型名称</label>
      <input type="text" class="ai-config-input" id="ai-model" placeholder="qwen/qwen3-next-80b-a3b-instruct">
    </div>
    <div class="ai-config-item">
      <label>Temperature (0-2)</label>
      <input type="number" class="ai-config-input" id="ai-temperature" min="0" max="2" step="0.1" value="0.7">
    </div>
    <div class="ai-config-item">
      <label>Max Tokens</label>
      <input type="number" class="ai-config-input" id="ai-max-tokens" min="1" max="8192" value="2048">
    </div>

    <div class="ai-config-section">
      <h3>个人身份配置</h3>
      <small style="color: #888; font-size: 11px; display: block; margin-bottom: 10px;">用于个性化提示和识别与您相关的内容</small>
    </div>

    <div class="ai-config-item">
      <label>我的姓名</label>
      <input type="text" class="ai-config-input" id="ai-my-name" placeholder="请输入您的姓名">
      <small style="color: #888; font-size: 11px; display: block; margin-top: 6px;">用于在OA审批意见中识别与您相关的内容</small>
    </div>

    <div class="ai-config-item">
      <label>其他信息</label>
      <textarea class="ai-config-input" id="ai-other-info" rows="3" placeholder="其他相关信息，如：直属领导XXX，分管副总XXX，部门XXX等"></textarea>
      <small style="color: #888; font-size: 11px; display: block; margin-top: 6px;">帮助AI更好地理解组织架构和识别相关人员</small>
    </div>

    <div class="ai-config-section">
      <h3>功能设置</h3>
    </div>

    <div class="ai-config-item ai-config-checkbox">
      <label>
        <input type="checkbox" id="ai-enable-double-click">
        双击网页空白处唤醒侧边栏
      </label>
    </div>

    <div class="ai-config-section">
      <h3>网页上下文设置</h3>
    </div>

    <div class="ai-config-item ai-config-checkbox">
      <label>
        <input type="checkbox" id="ai-use-context" checked>
        使用当前网页内容作为上下文
      </label>
    </div>

    <div class="ai-config-item">
      <label>上下文最大长度（字符）</label>
      <input type="number" class="ai-config-input" id="ai-context-length" min="1000" max="15000" step="1000" value="8000">
      <small style="color: #888; font-size: 11px; display: block; margin-top: 6px;">建议：3000-8000字符，过长可能导致请求失败</small>
    </div>

    <div class="ai-config-item">
      <label>单次请求最大字符数</label>
      <input type="number" class="ai-config-input" id="ai-max-total-chars" min="5000" max="50000" step="5000" value="25000">
      <small style="color: #888; font-size: 11px; display: block; margin-top: 6px;">包括上下文+历史对话，建议15000-30000</small>
    </div>

    <div class="ai-config-item">
      <label>保留对话轮数</label>
      <input type="number" class="ai-config-input" id="ai-max-history-rounds" min="1" max="20" step="1" value="5">
      <small style="color: #888; font-size: 11px; display: block; margin-top: 6px;">多轮对话时保留的最近对话轮数</small>
    </div>

    <div class="ai-config-item">
      <label>上下文状态</label>
      <div id="ai-context-status" class="context-status">点击"刷新上下文"查看状态</div>
    </div>

    <div class="ai-config-actions">
      <button class="ai-config-save">保存</button>
      <button class="ai-config-reset">恢复默认</button>
      <button class="ai-refresh-context">🔄 刷新上下文</button>
    </div>
  </div>
</div>
  
  <script src="lib/marked.min.js"></script>
  <script src="lib/highlight.core.min.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
